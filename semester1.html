<!DOCTYPE html>
<html>
<head>
    <title>Semester 1 - GPA Calculator</title>
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+SC:ital,wght@0,100..900;1,100..900&family=Black+Ops+One&family=Gravitas+One&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Rubik+Storm&display=swap" rel="stylesheet">

</head>
<body class="sem1body">
    <div class="titlecard">
        <h1 class="sem1title">Semester 1</h1>
    </div>    
    <div class="subjectcount">
        <label for="subjects">ENTER NUMBER OF SUBJECTS</label>
        <input type="number" id="subjects" name="subjects" min="1" max="10" placeholder="Number of Theory Subjects">
        <input type="number" id="labsubjects" name="labsubjects" min="0" max="10" placeholder="Number of Practical Subjects">
        <input type="number" id="othersubjects" name="othersubjects" min="0" max="10" placeholder="Number of Other Subjects">
        <button onclick="generateFields()">Submit</button>
    </div>
    <div id="inputcontainer">
        <div id="theoryContainer"></div>
        <div id="labContainer"></div>
        <div id="otherContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
